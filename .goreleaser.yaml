version: 2

project_name: modjo

before:
  hooks:
    - go mod tidy

builds:
  - id: modjo
    main: ./cmd/modjo
    binary: modjo
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/tdeschamps/modjo-cli/internal/cmd/version.Version={{.Version}}
      - -X github.com/tdeschamps/modjo-cli/internal/cmd/version.Commit={{.ShortCommit}}
      - -X github.com/tdeschamps/modjo-cli/internal/cmd/version.Date={{.Date}}
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

sboms:
  - artifacts: archive

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# Homebrew, Scoop, and Docker publishing are disabled for the first releases:
# they push to repos/namespaces that don't exist yet (modjo/homebrew-tap,
# modjo/scoop-bucket, ghcr.io/modjo/cli) and would fail the release. The first
# releases ship via GitHub Releases (signed archives + checksums + SBOM),
# `go install`, and install.sh. To enable a channel below:
#   - Homebrew: create the tap repo, set `owner` to its real owner, and add a
#     HOMEBREW_TAP_GITHUB_TOKEN (PAT with repo scope) secret + token: field.
#   - Scoop: same, with a scoop bucket repo.
#   - Docker: point image_templates at ghcr.io/<repo-owner>/... so the built-in
#     GITHUB_TOKEN can push, and log in to GHCR in release.yml.
